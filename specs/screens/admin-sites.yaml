version: "2.0"

screen:
  name: 기도터 관리
  route: /admin/sites
  layout: dashboard
  auth: true
  roles: [admin]

data_requirements:
  - resource: prayer_sites
    needs: [id, name, address, lat, lng, type, description, images, contact, is_visible, created_at]

components:
  - id: admin_sidebar
    type: navigation
    position: sidebar
    function: 관리자 사이드 메뉴 (기도터/큐레이션/배너)
    events:
      - on: click:menu
        do: 선택한 관리 페이지로 이동

  - id: site_data_table
    type: table
    position: main
    function: 기도터 목록 테이블 (Tanstack Table - 정렬/필터/페이지네이션)
    data_source:
      resource: prayer_sites
    events:
      - on: click:row
        do: 기도터 수정 다이얼로그 열기
      - on: click:delete
        do: 삭제 확인 다이얼로그 열기
      - on: click:visibility
        do: 노출 on/off 토글

  - id: site_form_dialog
    type: form
    position: overlay
    function: 기도터 등록/수정 폼 (react-hook-form + zod)
    data_source:
      resource: prayer_sites
    events:
      - on: submit
        do: 기도터 저장 (insert/update)
      - on: click:coordinate_picker
        do: 지도에서 좌표 선택 모달 열기

  - id: create_button
    type: button
    position: main
    function: 새 기도터 등록 버튼
    events:
      - on: click
        do: 빈 등록 폼 다이얼로그 열기

connections:
  navigations:
    - from: admin_sidebar
      to: /admin/curations
    - from: admin_sidebar
      to: /admin/banners

  shared_components:
    - admin_sidebar

tests:
  - name: 초기 로드
    when: 관리자 로그인 후 접속
    then:
      - 기도터 목록 테이블 표시
      - 새 등록 버튼 표시

  - name: 기도터 등록
    when: 새 등록 버튼 클릭 → 폼 작성 → 제출
    then:
      - 기도터 저장 성공
      - 목록에 새 기도터 표시

  - name: 기도터 수정
    when: 테이블 행 클릭 → 정보 수정 → 제출
    then:
      - 수정 내용 저장
      - 목록 갱신

  - name: 비인증 접근
    when: 비로그인 상태에서 /admin/sites 접속
    then:
      - 관리자 로그인 페이지로 리다이렉트
