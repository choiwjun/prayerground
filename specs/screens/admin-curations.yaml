version: "2.0"

screen:
  name: 큐레이션 관리
  route: /admin/curations
  layout: dashboard
  auth: true
  roles: [admin]

data_requirements:
  - resource: curations
    needs: [id, title, description, cover_image, site_ids, sort_order, is_visible]

  - resource: prayer_sites
    needs: [id, name, type]

components:
  - id: admin_sidebar
    type: navigation
    position: sidebar
    function: 관리자 사이드 메뉴
    events:
      - on: click:menu
        do: 선택한 관리 페이지로 이동

  - id: curation_list
    type: list
    position: main
    function: 큐레이션 목록 (드래그 순서 변경)
    data_source:
      resource: curations
    events:
      - on: drag:reorder
        do: sort_order 업데이트
      - on: click:item
        do: 큐레이션 편집 다이얼로그 열기
      - on: click:visibility
        do: 노출 on/off 토글

  - id: curation_form_dialog
    type: form
    position: overlay
    function: 큐레이션 생성/편집 폼
    data_source:
      resource: curations
    events:
      - on: submit
        do: 큐레이션 저장
      - on: click:add_site
        do: 기도터 선택 모달 열기 (검색 + 체크박스)

  - id: create_button
    type: button
    position: main
    function: 새 큐레이션 생성 버튼
    events:
      - on: click
        do: 빈 생성 폼 다이얼로그 열기

connections:
  navigations:
    - from: admin_sidebar
      to: /admin/sites
    - from: admin_sidebar
      to: /admin/banners

  shared_components:
    - admin_sidebar

tests:
  - name: 초기 로드
    when: 관리자 접속
    then:
      - 큐레이션 목록 표시 (sort_order 순)
      - 새 생성 버튼 표시

  - name: 큐레이션 생성
    when: 생성 → 제목/설명 입력 → 기도터 선택 → 제출
    then:
      - 큐레이션 저장 성공
      - 목록에 추가

  - name: 순서 변경
    when: 큐레이션 드래그로 순서 변경
    then:
      - sort_order 업데이트
      - 홈 화면에 변경된 순서 반영
